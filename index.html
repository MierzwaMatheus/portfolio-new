<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />

    <!-- Título e descrição básica -->
    <title>Rubrica Portfolio</title>
    <meta
      name="description"
      content="A professional portfolio template."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="Rubrica Portfolio" />
    <meta
      property="og:description"
      content="A professional portfolio template."
    />
    <meta property="og:image" content="" />
    <meta property="og:site_name" content="Rubrica Portfolio" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="" />
    <meta property="twitter:title" content="Rubrica Portfolio" />
    <meta
      property="twitter:description"
      content="A professional portfolio template."
    />
    <meta property="twitter:image" content="" />
    <meta property="twitter:creator" content="" />

    <!-- Configurações adicionais -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="author" content="Portfolio Author" />
    <meta
      name="keywords"
      content="portfolio, developer, web development"
    />

    <!-- Favicon e ícones -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Portfolio RSS Feed"
      href="/rss.xml"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
